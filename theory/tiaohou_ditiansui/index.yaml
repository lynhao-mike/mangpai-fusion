  claim: 命局以中和平正为贵，明显偏枯往往对应结构性损耗或稳定性不足。
  conditions:
    trigger: always
    required:
    - 五行偏全或寒热燥湿状态可判定
    optional:
    - 有冲动、顺逆或旺衰进退证据
