      '
    trigger_conditions:
    - 原局寒气过甚，水金旺或冬令寒湿明显
    - 火元素无根无气，不能解冻
    - 壬癸亥子再透再临，寒势被继续增强
    adjustment_mechanism:
    - 如果大运流年再逢壬癸亥子，则寒滞增强，事业财运判断下调
    - 如果大运流年逢丙丁巳午并在地支有根，则忌水判断减弱
    - 如果原局已有戊己未戌制水并不伤用火，则寒水之害减轻
    prediction_target:
    - 事业
    - 财运
    - 健康
    - 应期
    evidence:
    - 若寒甚而暖无气，过于暖者，反以无寒为宜也。
    - 天道有寒暖，发育万物，人道行之，不可过也。
    - 得气之寒，遇暖而发。
    confidence_init: 0.5
