- Rule:
    id: TIAOHOU-DTS-CAND-001
    school: tiaohou_ditiansui
    canon: 滴天髓调候派
    rule_type:
    - STRUCTURE
    - GENERAL_PRINCIPLE
    statement: '命局寒气成势且火无根气时，事业推进与身体活力按寒滞结构判为受阻；原局或岁运见有根之丙丁巳午时，该阻滞判断解除并转为可发。

      '
    trigger_conditions:
    - 原局水金成势或生于冬令，寒气可判定
    - 火元素不透或透而无根，不能温局
    - 日主或用事五行受寒滞影响，生发能力不足
    adjustment_mechanism:
    - 如果原局或大运流年见有根之丙丁巳午，则寒滞减弱，事业与健康判断上调
    - 如果再逢亥子申酉金水岁运而无火土制化，则寒滞增强，阻滞判断加重
    - 如果原局构成从寒从水且顺其气势成立，则本规则失效
    prediction_target:
    - 事业
    - 健康
    - 性格
    - 应期
    evidence:
    - 天道有寒暖，发育万物，人道行之，不可过也。
    - 寒虽甚，要暖有气，暖虽至，要寒有根，则能生成万物。
    - 此寒金冷水，木凋土寒；寅中丙火为用，一阳解冻，得气之寒，遇暖而发。
    confidence_init: 0.5
- Rule:
