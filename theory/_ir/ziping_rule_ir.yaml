  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 偏官即七杀，七杀有制为偏官，无制攻身则祸。制杀用神，以食神、阳刃为上。杀格运喜食伤制杀、印绶化杀，忌财生杀旺攻身。
  source_line: 155
- rule_id: ZP-SRC-20260617-014
  theory_id: ziping
  statement: 伤官不宜无制见官；伤官生财可转财富之用，伤官配印可转名学之贵，若无财印救应而官星来混，则以祸患破格论。
