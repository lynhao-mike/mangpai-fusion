  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 建禄、月劫，日主得禄得劫，身旺。禄劫无财官取用，喜财官透出成格。禄劫格喜财官运，用财则官护财，用官则财生官。
  source_line: 173
