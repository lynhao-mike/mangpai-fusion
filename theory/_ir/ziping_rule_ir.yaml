  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 财喜食神生，喜官星护，忌比肩劫财夺财。身旺财旺，富格；财旺身弱，不能任财；身旺财弱，财薄。
  source_line: 136
- rule_id: ZP-SRC-20260617-011
  theory_id: ziping
  statement: 印绶以护身生身为用，喜官杀生印，忌财星破印、食伤泄印；若印旺身强，则转喜食伤吐秀以泄其过旺。
