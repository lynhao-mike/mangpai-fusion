  status: active
  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 吉神被合则失用，凶神被合则化凶。男命财为妻，财被合夺；女命官为夫，官被合离，皆六亲不合之象。
  source_line: 29
- rule_id: ZP-SRC-20260617-003
  theory_id: ziping
  statement: 旺衰以月令为提纲但不得单凭月令定强弱；失令而地支有根、有助可转旺，得令而遭重克、失地无助亦可转弱。
  structure_type:
  - use_god
  element_vector:
    wood: 1
    fire: 0
    earth: 0
    metal: 1
    water: 0
  domain:
  - career
  - health
