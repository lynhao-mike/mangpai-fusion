  source_excerpt: 天干主表面，地支主内里……地支藏干喜忌，大运引出透干，谓之透清。藏中用神，运岁透出，格局显用；藏中忌神，运岁透出，祸患显现。
  source_line: 117
- rule_id: ZP-SRC-20260617-009
  theory_id: ziping
  statement: 正官成格以官星清纯为要：官星宜一位得月令或透藏有力，并得财印扶助；若杀混、伤官破官、刑冲破害或贪合忘官，则官格受损。
