- rule_id: ZP-SRC-20260617-001
  theory_id: ziping
  statement: 十干相合须得月令化神之气方可论化；不得令、隔干受冲克或地支冲破者，只作合绊，原干仍按本五行生克取断。
  structure_type:
  - pattern
