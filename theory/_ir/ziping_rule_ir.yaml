  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 日主无根，全局聚成一方旺势，谓之从势。从财、从杀、从儿，各从其旺。真从喜助旺势，忌生扶日主破格；假从逢帮身运破从格。
  source_line: 190
