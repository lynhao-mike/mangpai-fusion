  status: active
  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 旺衰以月令为提纲，然得地得助，虽失令亦不弱；失地无助，虽得令亦不强。
  source_line: 35
- rule_id: ZP-SRC-20260617-004
  theory_id: ziping
  statement: 地支刑冲会合以是否散局、成局、损用为裁断核心；合可解冲，制可解刑，若刑破格局则优先标记为用神受损。
  structure_type:
  - pattern
  - use_god
  - avoid_god
  element_vector:
    wood: 0
    fire: 0
    earth: 0
    metal: 0
    water: 0
  domain:
  - career
