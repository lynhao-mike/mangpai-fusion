  source_path: sources/ziping/穷通宝鉴-明-余春台_part2.md
  source_excerpt: 正月庚金，木旺之际，有土皆死，不能生金，且金之寒气未除，先用丙暖庚性，又虑土厚埋金，须甲疏泄。二月庚金，专用丁火，借甲引丁，借庚劈甲。三月庚金，戊土司令，无生金之理，有埋金之忧，故先甲後丁。
  source_line: 76
- rule_id: ZP-SRC-20260617-056
  theory_id: ziping
  statement: 庚金夏用调候：四月庚金长生于巳，先壬水求中和，次取戊土、丙火佐之；五月庚金败地专用壬水，癸次之；六月庚金三伏生寒顽钝，先丁火次甲木。
