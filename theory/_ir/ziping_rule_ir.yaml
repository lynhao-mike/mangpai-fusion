  source_excerpt: 四月庚金，长生於巳，巳内有戊，丙不熔金，故不畏火炎，丙亦可作用，但先壬水，方得中和。五月庚金，丁火旺烈，庚金败地，专用壬水，癸又次之。六月庚金，三伏生寒，顽钝极矣，先用丁火，次取甲木。
