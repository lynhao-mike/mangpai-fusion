  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 官星纯粹，无杀混杂，无伤官破损，谓之正官成格。官格运喜财印，财以生官，印以护身；忌伤官、七杀旺运破官。
  source_line: 129
