  - fate
  status: active
  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 十干五合：甲己合土，乙庚合金，丙辛合水，丁壬合木，戊癸合火。合有正合、化合之分。得月令之气则化，不得月令只作牵绊。
  source_line: 26
- rule_id: ZP-SRC-20260617-002
  theory_id: ziping
  statement: 吉神被合则失用，凶神被合则化凶；财官被合夺时，应同步转入婚姻六亲层判断其配偶缘分与关系稳定性。
  structure_type:
  - ten_gods
  - avoid_god
  element_vector:
    wood: 0
    fire: 0
    earth: 0
    metal: 0
    water: 0
  domain:
