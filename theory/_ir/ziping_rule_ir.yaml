  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 阳刃为刚猛之气，身旺刃旺，喜官杀制刃，刃无制则凶。刃格喜官杀运制刃，忌比劫帮刃、食伤泄刃。
  source_line: 167
