  - fate
  status: active
  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 三会聚一方之气，三合成局。冲则散局，合则解冲……刑破格局则损用神。解法全在合神、制神，以合解冲，以克解刑。
  source_line: 40
- rule_id: ZP-SRC-20260617-005
  theory_id: ziping
  statement: 用神可随干支组合而变格：月令正用遇财多生官、官多护财、地支会合或天干透出时，应按变格后的主导十神重新取用。
  structure_type:
  - pattern
  - ten_gods
  - use_god
  element_vector:
    wood: 0
