  - fate
  status: active
  source_path: sources/ziping/《子平真诠》.md
  source_excerpt: 用神随干支组合变换格局，正用可变偏用。月令本为官星，财多生官变财格；月令本为财星，官多护财变官格。
  source_line: 55
- rule_id: ZP-SRC-20260617-006
  theory_id: ziping
  statement: 辰戌丑未杂气取用以透干与会局为准；本气、余气、墓气虽藏于支内，若不透不聚，则难作正用。
  structure_type:
