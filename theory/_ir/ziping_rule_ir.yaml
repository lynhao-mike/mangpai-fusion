  source_path: sources/ziping/穷通宝鉴-明-余春台_part2.md
  source_excerpt: 春月之金，余寒未尽，贵乎火气为荣，性柔体弱，欲得厚土辅助。夏月之金，尤为柔弱，火多而郤为不厌，水盛而滋润呈祥。秋月之金，当权得令，火来煆炼，遂成钟鼎之材。冬月之金，形寒性冷，土能制水，金体不寒，火来助土，子母成功。
  source_line: 67
- rule_id: ZP-SRC-20260617-055
  theory_id: ziping
  statement: 庚金春用调候：正月庚金先丙暖性，须甲疏土防埋金；二月专用丁火，借甲引丁、借庚劈甲；三月土旺金顽，先甲后丁，乏甲不能立业，乏丁不能成名。
  structure_type:
