version: v4.2.0
extractors:
  ziping_career_pressure:
    formula: day_master_strength if day_master_strength >= 0.5 else (1.0 - day_master_strength) * 0.6
    inputs:
    - day_master_strength
    output_range:
    - 0.0
    - 1.0
    rationale: 身强需外泄能量，事业压力大；身弱则事业压力小
    version: v4.2.0
  ziping_wealth_activity:
    formula: energy_level_score * (1.0 - abs(day_master_strength - 0.5))
    inputs:
    - energy_level.score
    - day_master_strength
    output_range:
    - 0.0
    - 1.0
    rationale: 能量水平 × 身强弱平衡度，越接近中和财运越活跃
    version: v4.2.0
  ziping_relationship_tension:
    formula: min(rule_count_by_system_ziping / max(rule_count_by_system_ziping + rule_count_by_system_ditiansui, 1), 1.0) * 0.8
    inputs:
    - rule_count_by_system.ziping
    - rule_count_by_system.ditiansui
    output_range:
    - 0.0
    - 0.8
    rationale: 子平规则占比 × 0.8 系数，反映婚姻张力（total = ziping + ditiansui）
    version: v4.2.0
  dtt_imbalance_index:
    formula: 1.0 - tiaohou_balance_score
    inputs:
    - tiaohou.balance_score
    output_range:
    - 0.0
    - 1.0
    rationale: 调候平衡度反转，越不平衡越高
    version: v4.2.0
  dtt_seasonal_pressure:
    formula: min(len(tiaohou_missing_elements) * 0.2, 1.0)
    inputs:
    - tiaohou.missing_elements
    output_range:
    - 0.0
    - 1.0
    rationale: 缺失五行数量 × 0.2，反映季节压力
    version: v4.2.0
  dtt_transformation_likelihood:
    formula: min(wuhe_count * 0.25, 1.0)
    inputs:
    - wuhe_relations
    output_range:
    - 0.0
    - 1.0
    rationale: 五合成化数量 × 0.25，反映转化概率
    version: v4.2.0
  mp_symbolic_event_weight:
    formula: (passed_layers / 3.0 + confidence_percent) / 2.0
    inputs:
    - gate.passed_layers
    - gate.confidence.percent
    output_range:
    - 0.0
    - 1.0
    rationale: 通过层数占比与置信度的平均值
    version: v4.2.0
fusion_rules:
  career_change:
    method: bayesian_log_odds
    signal_sources:
    - - ziping.career_pressure
      - ziping
    - - dtt.seasonal_pressure
      - tiaohou_ditiansui
    conflict_threshold: 0.35
    conflict_fallback: ziping * 1.5
    rationale: 事业变动：子平身强压力 + 滴天髓季节压力，冲突时子平优先（×1.5）
  wealth_shift:
    method: bayesian_log_odds
    signal_sources:
    - - ziping.wealth_activity
      - ziping
    - - dtt.transformation_likelihood
      - tiaohou_ditiansui
    conflict_threshold: 0.35
    conflict_fallback: null
    rationale: 财运变化：子平财运活跃度 + 滴天髓转化概率
  relationship_shift:
    method: bayesian_log_odds
    signal_sources:
    - - ziping.relationship_tension
      - ziping
    - - dtt.imbalance_index * 0.6
      - tiaohou_ditiansui
    conflict_threshold: 0.35
    conflict_fallback: null
    rationale: 婚姻变化：子平婚姻张力 + 滴天髓失衡度（×0.6 系数）
domain_mappings:
  婚姻:
    meaning_candidates:
    - 婚变/离合
    - 情感纠葛
    - 配偶健康
    priority: 90
  财运:
    meaning_candidates:
    - 财源增减
    - 投资置业
    - 破财风险
    priority: 85
  事业:
    meaning_candidates:
    - 职位变动
    - 创业机遇
    - 事业受挫
    priority: 88
  健康:
    meaning_candidates:
    - 伤病风险
    - 手术外伤
    - 慢性耗损
    priority: 80
  学业:
    meaning_candidates:
    - 考学升迁
    - 学业受阻
    priority: 70
  六亲:
    meaning_candidates:
    - 六亲变故
    - 人际争端
    priority: 60
  其他:
    meaning_candidates:
    - 意外变化
    priority: 10
school_weights:
  ziping: 0.42
  tiaohou_ditiansui: 0.32
  blind: 0.26
