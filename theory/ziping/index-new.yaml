- id: ZP-PROD-20260605-002
  status: active
  expert_system: ziping
  title: 财格要看身财关系
  topic: wealth_structure
  domains:
  - 财富
  - 事业
  axis_refs:
  - AXIS-01
  - AXIS-04
  - AXIS-06
  claim: 财运不能只看财星多少，必须判断身能否任财，以及财是否有生护。
  conditions:
    trigger: has_wealth_picture
    required:
    - 财星明确出现或成势
    - 日主旺衰已判定
    optional:
    - 食神生财
    - 官星护财
    exclusions:
    - 财星仅见而无根无生护时，不可直接断富
  output:
    statement: 子平规则参与：财星可用但仍需看身财承载与生护，否则容易财来财去或难任财帛。
    falsifiable: 若财旺身弱且无结构补救者长期稳定富裕，本规则需复审。
  source:
    path: sources/ziping/《子平真诠》.md
    excerpt: 财喜食神生、官星护，忌比肩劫财夺财。财旺身弱，难任财帛；身旺财弱，财薄清贫。
  review:
    notes: 由候选规则批量提升为生产生成规则；原审查备注：对应 ZP-SAMPLE-012；可直接连接财富域权重矩阵。
