  - AXIS-04
  claim: 用神是八字全局判断的核心支点，格局成败与吉凶取舍应围绕用神展开。
  conditions:
    trigger: has_wealth_picture
    required:
    - 已能识别月令与日主旺衰
    - 用神来源可追溯到月令、透干或藏干
    optional:
    - 存在相神或救应结构
    exclusions:
    - 从格、化格、专旺等特殊格尚未确认时，不可机械套用普通扶抑
  output:
    statement: 子平规则参与：命局判断应先定用神，再围绕用神成败评估事业、财富与整体层次。
