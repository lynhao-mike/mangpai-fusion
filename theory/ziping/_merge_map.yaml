      excerpt: 经云：以年为祖业，月为父母兄弟门户，日为妻妾己身，时为子息。须看四柱之中父母兄弟妻子星具何地？论旺相休囚而言其吉凶。如父母星坐长生旺库禄马贵人之地，则主父母富贵福寿荣耀；如坐空刑克煞死亡衰败交并之地，则主父母贫薄破伤刑夭，或死于外及不善终。
    - rule_id: ZP-PROD-20260618-020
