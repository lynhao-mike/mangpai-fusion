    - rule_id: ZP-PROD-20260605-003
      path: sources/ziping/《子平真诠》.md
      excerpt: 月令为用神第一出处，月令透出之干、藏干可用者，即为正用。
    - rule_id: ZP-PROD-20260606-002
      path: sources/ziping/《三命通会》.md
      excerpt: 月令提纲、旺相休囚、四时进退
