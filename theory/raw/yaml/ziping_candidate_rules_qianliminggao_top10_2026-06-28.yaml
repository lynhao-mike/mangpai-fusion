      path: sources/qianliminggao/千里命稿_part3.md
      excerpt: 考八字有外格之设，无非为其越出常情也。然越出常情，亦得有规矩存焉。否则杂乱无章，直为下命耳。
      line: 434
    review:
      notes: 优先用于防误判，不直接追求多产出结论。

