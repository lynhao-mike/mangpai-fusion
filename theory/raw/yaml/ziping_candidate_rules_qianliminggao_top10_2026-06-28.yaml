rules:
  - id: ZP-CAND-QLMG-20260628-009
    status: candidate
    expert_system: ziping
    title: 正官格成于身官财印平衡
    topic: official_career
    domains:
      - 事业
      - 婚姻
      - 学业
    axis_refs:
      - AXIS-01
      - AXIS-04
      - AXIS-06
    claim: 正官格的成立依赖日主承载、财印配合与官杀清纯，不可只因见官即断贵。
    conditions:
      required:
        - 命局已识别正官格候选
        - 日主强弱已判定
        - 可判断财印是否生扶官星或护卫日主
      optional:
        - 官星得月令或有根
        - 官星得财生或印护
      exclusions:
        - 七杀混杂而未清
        - 仅见官星名号、无承载与配套结构时不可直接定格
    output:
      statement: 正官格需看身官财印是否平衡、官杀是否清纯，再判断事业层级与婚姻稳定性。
      falsifiable: 若大量官杀混杂或财印失衡命局仍稳定表现为正官清贵，则本规则需复审。
    source:
      path: sources/qianliminggao/千里命稿_part3.md
      excerpt: 正官格为（一）日干强，又有财来生官。（二）日干弱，正官强，有印生身。（三）正官不见七杀混杂。
      line: 111
    review:
      notes: 来自《千里命稿》前 10 条优先候选；可直接绑定 official_career_hit 与 marriage_hit。

  - id: ZP-CAND-QLMG-20260628-010
    status: candidate
    expert_system: ziping
    title: 财格成于能任能生能护
    topic: wealth_structure
    domains:
      - 财富
      - 事业
      - 婚姻
    axis_refs:
      - AXIS-01
      - AXIS-04
      - AXIS-06
    claim: 财格判断不能只看财星多少，必须同时判断日主能否任财、财是否有源、是否有官护或食伤生财。
    conditions:
      required:
        - 命局已识别财格候选或财星成势
        - 日主旺衰已判定
      optional:
        - 食伤生财
        - 官星护财
        - 印比助身任财
      exclusions:
        - 财星仅见而无根无源无护时不可直接断富
    output:
      statement: 财格需同时审查身财承载、财源生护与破财风险，不能因财多即断富裕。
      falsifiable: 若大量财旺身弱且无结构补救命局长期稳定富足，则本规则需降权。
    source:
      path: sources/qianliminggao/千里命稿_part3.md
      excerpt: 偏正财为格（一）日干强，财亦强，再见官星。（二）日干弱，财星强，有印比护身。（三）日干强，财星弱，有伤食生财。
      line: 116
    review:
      notes: 前 10 条保留；优先绑定 wealth_hit。

  - id: ZP-CAND-QLMG-20260628-013
    status: candidate
    expert_system: ziping
    title: 七杀格贵在制化与清纯
    topic: official_career
    domains:
      - 事业
      - 健康
      - 灾厄
    axis_refs:
      - AXIS-01
      - AXIS-04
      - AXIS-08
    claim: 七杀并非纯凶，关键在食制、印化、身杀平衡与不混官；制化得当可成权柄，不当则生风险。
    conditions:
      required:
        - 命局已识别七杀格候选或七杀成势
        - 可判断是否有食制杀或印化杀
      optional:
        - 身杀两停
        - 七杀得令或有根
      exclusions:
        - 官杀混杂而未分清
        - 只见七杀名号不可直接断权或断灾
    output:
      statement: 七杀结构应先审查制杀、化杀与身杀平衡，再判断权力机会与健康灾厄风险。
      falsifiable: 若无制无化七杀结构长期稳定应吉，或制化充足却长期显著失验，则需复审。
    source:
      path: sources/qianliminggao/千里命稿_part3.md
      excerpt: 七杀为格（一）身强（二）日干强，杀尤过之，有食制杀。（三）日干弱，杀旺。有印生身。（四）杀身两停，无官混杀。
      line: 128
    review:
      notes: 绑定 official_career_hit 与 health_risk_hit；风险表达应保持低权重审查口径。

  - id: ZP-CAND-QLMG-20260628-014
