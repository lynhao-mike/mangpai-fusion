      excerpt: 伤官为格（一）日干强，伤官生财。（二）日干弱伤官泄气，有印护身。（三）日干弱，伤官旺，而杀印双透。（四）日干强，杀重，伤官驾杀。
      line: 133
    review:
      notes: 绑定 official_career_hit、wealth_hit、marriage_hit；适合作多域候选。

  - id: ZP-CAND-QLMG-20260628-016
    status: candidate
    expert_system: ziping
    title: 外格必须一气专旺且有规矩
    topic: yongshen_pattern
    domains:
      - 总体
      - 事业
      - 财富
    axis_refs:
