      - AXIS-04
    claim: 从格、化格、专旺格必须具备一气成势、秩序清楚、少逆杂破坏，否则不可轻判外格。
    conditions:
      required:
        - 命局存在从格、化格、专旺或外格候选
        - 可判断是否一气专旺且少逆杂破坏
