      - 财富
      - 婚姻
      - 性格
    axis_refs:
      - AXIS-01
      - AXIS-04
      - AXIS-06
      - AXIS-08
    claim: 伤官的效应需区分生财、配印、驾杀与见官破局，不可把伤官一概视为凶神。
    conditions:
      required:
        - 命局已识别伤官格候选或伤官透出成势
        - 日主强弱已判定
      optional:
