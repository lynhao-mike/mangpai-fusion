    conditions:
      required:
        - 月令可识别
        - 月令透干或藏干可评估
      optional:
        - 其他柱存在呼应月令的干支
      exclusions:
        - 特殊格局已成立且不按普通月令取用时需另行审查
    output:
      statement: 子平取用应优先追溯月令，再结合透干、藏干与全局结构判断。
      falsifiable: 若大量命例中月令不具主导性而其他柱长期更优先，则需重估。
    source:
      path: sources/ziping/《子平真诠》.md
      excerpt: 月令为用神第一出处，月令透出之干、藏干可用者，即为正用。
    review:
      notes: 对应 ZP-SAMPLE-002；需与调候派四季旺衰对照。

  - id: ZP-CAND-20260605-004
