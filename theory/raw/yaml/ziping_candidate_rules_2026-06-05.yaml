    output:
      statement: 全局吉凶应围绕用神成败展开，不能只看局部五行或单柱吉凶。
      falsifiable: 若不依赖用神成败仍能做出同等质量判断，则此条要降级为辅助原则。
    source:
      path: sources/ziping/《子平真诠》.md
      excerpt: 用神一立，全造吉凶以此定。
    review:
      notes: 对应 ZP-SAMPLE-004；适合裁判层作为结构成败输入。

  - id: ZP-CAND-20260605-006
    status: candidate
    expert_system: ziping
    title: 用神受克要看救应
    topic: jiuying
    domains:
      - 事业
      - 婚姻
      - 财富
    axis_refs:
      - AXIS-04
      - AXIS-07
      - AXIS-08
    claim: 用神受克不等于必败，还要看是否存在护用、制克、合化等救应。
    conditions:
      required:
        - 用神明确受克或受破
        - 可识别制克用神之物或护卫用神之物
      optional:
        - 有合化、通关或相神协助
      exclusions:
        - 无明确受克关系时不应强行套用救应判断
    output:
      statement: 用神被克后需复核救应，救应存在时破局程度应重新计算。
      falsifiable: 若用神受克但无救仍长期应吉，则此规则失效。
    source:
      path: sources/ziping/《子平真诠》.md
      excerpt: 用神喜生扶、忌克破。用神被克为败，有干支制克用神之物、护卫用神，谓之救应。
    review:
      notes: 对应 ZP-SAMPLE-005；可与滴天髓冲动强弱规则组成冲击处理链。

  - id: ZP-CAND-20260605-007
    status: candidate
    expert_system: ziping
    title: 格局纯杂影响高低
    topic: geju_chunza
    domains:
      - 事业
      - 财富
      - 性格
    axis_refs:
      - AXIS-04
      - AXIS-06
    claim: 格局结构越纯一、力量越集中，层级和稳定性通常越高；混杂会带来干扰与波折。
    conditions:
      required:
        - 已识别主要用神或格局
        - 可判断是否有异神混杂或干扰用神
      optional:
        - 有财官印食或杀伤枭刃的组合证据
      exclusions:
        - 混杂但能制化成用时需转入制化规则审查
    output:
      statement: 格局纯杂应影响事业、财富层级与结构稳定性判断。
      falsifiable: 若多数杂局仍高度稳定且不低于纯局，则需要修正纯杂权重。
    source:
      path: sources/ziping/《子平真诠》.md
      excerpt: 纯者，用神一气专一，无他神混杂；杂者，别神透出干扰用神。格纯则贵，格杂则贫贱多波折。
    review:
      notes: 对应 ZP-SAMPLE-006；需与滴天髓中和平正原则并行审查。

