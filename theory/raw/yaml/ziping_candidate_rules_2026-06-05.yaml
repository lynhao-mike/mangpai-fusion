    output:
      statement: 普通格局应先判日主强弱，再决定取克泄或生扶的用神方向。
      falsifiable: 若大量身旺仍取生扶且稳定应验，需要标注例外或转入特殊格局。
    source:
      path: sources/ziping/《子平真诠》.md
      excerpt: 日主旺，用神取克泄；日主弱，用神取生扶。
    review:
      notes: 对应 ZP-SAMPLE-003；与 DTS-CAND 扶抑裁量高度同向。

