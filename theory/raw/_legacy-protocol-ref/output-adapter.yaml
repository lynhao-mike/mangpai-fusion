# v5.0 输出适配器 · Output Adapter
# 根据策略+问题类型自动选择最合适的输出形态
# version: 5.0
# created: 2026-05-21
# status: active
#
# AI执行摘要（5行人话）：
# 1. 证据聚合器输出结论后，本适配器决定"用什么格式呈现给用户"
# 2. 策略B→全面画像(长) / 策略A→专题聚焦(中) / 策略C→时间线(短) / 简单看→快速回答(极短)
# 3. 所有形态共享common_rules：负面必附趋避、不绝对化、必有推理链
# 4. 输出末尾必须有【工具调用记录】块
# 5. 本文件替代旧output-template.md的单一4层格式

output_modes:

  全面画像:
    when: "策略B / 用户要求全面分析"
    estimated_length: "2000-3500字"
    structure:
      - section: 命局概要
        content: "3行排盘确认（四柱/当前运/流年）"
      - section: D1骨架
        content: "M1定性——格局+层次+做功方向+核心矛盾（一句口语化比喻）"
      - section: D3铁口断
        content: "M3验证——确定的事实（<=5条，每条有推理链+规则ID）"
      - section: D2画面展开
        content: "M2具象化——每个铁口断的画面+人物+细节"
      - section: 概率断
        content: "三维汇总——可能但未确定的事（<=8条，每条附反例条件）"
      - section: 应期时间线
        content: "D3主导——未来5-10年逐年概览（★标关键年）"
      - section: 六亲速览
        content: "父/母/兄弟/配偶/子女各一句"
      - section: 趋避建议
        content: "D2主导——调候改运6维 + 近年行动建议"
      - section: 免责声明
        content: "标准免责（命理为参考，非医疗/法律/金融建议）"

  专题聚焦:
    when: "策略A / 用户问具体问题"
    estimated_length: "800-1500字"
    structure:
      - section: 排盘确认
        content: "1行（四柱+当前运+流年）"
      - section: 主导维度快判
        content: "对应维度的核心结论（带推理链：原局事实→规则→结论）"
      - section: 交叉验证
        content: "另两维度的确认/否定/补充"
      - section: 证据强度
        content: "每条结论标★级+依据规则ID"
      - section: 针对性建议
        content: "回应用户具体问题的行动方案（具体可执行）"
      - section: 免责声明
        content: "标准免责"

  应期时间线:
    when: "策略C / 什么时候类问题"
    estimated_length: "500-1000字"
    structure:
      - section: 排盘确认
        content: "1行"
      - section: 应期结论
        content: "D1粗窗口 → D3精确年 → D2持续度（最终结论）"
      - section: 时间线
        content: "未来3-5年逐年标注（★标记关键年）"
      - section: 三层叠加验证
        content: "原局✓/✗ + 大运✓/✗ + 流年✓/✗ = 铁口/高置信/观察"
      - section: 行动建议
        content: "最佳行动点+应避开时段"
      - section: 免责声明
        content: "标准免责"

  快速回答:
    when: "简单问题 / 简单看看 / 不用太详细"
    estimated_length: "300-500字"
    structure:
      - section: 排盘
        content: "1行"
      - section: 核心结论
        content: "3-5行定论（骨架+最重要的1-2条铁口断）"
      - section: 建议深推方向
        content: "哪些方面值得详细展开（引导用户追问）"

# 所有输出形态的共同规则
common_rules:
  - "每条负面结论 = 结论本体 + 置信度 + 趋避建议（三者齐备才输出）"
  - "不使用绝对化用语（100%/必定/必死/必离）"
  - "每条铁口断必须有推理链（从原局事实→规则→结论）"
  - "每条铁口断必须标注依据规则ID（如M1-D-045, M2-Y-089, M3-R-131）"
  - "概率断必须附反例条件（若XX则此断不成立）"
  - "输出末尾必须有【工具调用记录】块"
  - "必须通过safety-rails.md全部SR-01~10检查"
  - "L5层次不输出（最高输出L4上限）"
  - "断灾必须大运+流年双条件具备才下断"

# 置信度体系（统一标准）
confidence_system:
  "★★★★★": { range: "4.5-5.0", meaning: "铁口定论", style: "确定/必然" }
  "★★★★":  { range: "4.0-4.4", meaning: "高置信", style: "大概率/几乎确定" }
  "★★★":   { range: "3.0-3.9", meaning: "中置信", style: "很可能/倾向于" }
  "★★":    { range: "2.0-2.9", meaning: "候选", style: "可能/有迹象" }
  "★":     { range: "<2.0", meaning: "存疑", style: "不主动输出" }

# 工具调用记录模板（输出末尾必须包含）
tool_log_template: |
  【本次工具调用记录】
  - 策略：<A问题驱动/B全面画像/C应期精推>
  - 主导维度：<D1/D2/D3>
  - 启动加载：route=<route_key>, files=<N>, ~<X>k tokens
  - 封存预测：[P-2026-XXX, ...] 或「无」
  - 校准回访：[P-YYYY-XXX: result] 或「无」
