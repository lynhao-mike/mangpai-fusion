# v5.0 证据聚合器 · Evidence Aggregator
# 每个结论都经过强度评估，不只是冲突时才启动
# version: 5.0
# created: 2026-05-21
# status: active
#
# AI执行摘要（5行人话）：
# 1. 三维引擎每出一个结论，都自动进入本聚合器评分
# 2. 评分=看三家是否同指+独立规则数+反例排除+三层叠加+案例验证
# 3. ★★★★★=铁口断(三家+3规则+三层叠加) / ★=存疑不输出
# 4. 遇到冲突先查CF-*14条裁定，无裁定则默认M1>M2>M3
# 5. 实证永远优先于理论权威

strength_levels:

  5-铁口断:
    score_range: [4.5, 5.0]
    criteria:
      - "三家同指同一结论"
      - ">=3条独立规则支持"
      - "M3三层叠加验证（原局有+大运到位+流年引爆）"
      - "反例条件已排除"
      - "不依赖时辰存疑的时柱"
    output_style: "确定/必然/铁口断："
    max_count_per_analysis: 5
    note: "宁缺毋滥，铁口断错一条比漏一条代价大"

  4-高置信:
    score_range: [4.0, 4.4]
    criteria:
      - "两家同指 + 一家不反对"
      - ">=2条独立规则"
      - "有应期窗口可验证"
    output_style: "大概率/几乎确定"

  3-中置信:
    score_range: [3.0, 3.9]
    criteria:
      - "一家强烈指向 + 另两家不反对"
      - "1条规则 + 有逻辑链"
      - "必须附反例条件"
    output_style: "很可能/倾向于"

  2-低置信:
    score_range: [2.0, 2.9]
    criteria:
      - "一家指向 + 缺乏佐证"
      - "仅供参考"
    output_style: "可能/有迹象"
    rule: "不主动输出，仅用户追问时提及"

  1-存疑:
    score_range: [0, 1.9]
    criteria:
      - "三家分歧 / 仅推理无直接规则"
    output_style: "不输出"
    rule: "入rule-conflicts.md观察"

aggregation_rules:

  rule_1_三家共识效应:
    condition: "D1+D2+D3对同一结论给出各自独立的支持规则"
    effect: "base_confidence + 0.5 → 自动进入铁口断区"
    example: "三家都说28岁结婚 → 直接铁口"

  rule_2_维度互补不算重复:
    condition: "D1说层次/D2说画面/D3说时间 → 是同一事的三面"
    effect: "不算冲突，合并为一条立体结论，不重复加分"
    example: "D1说L3大富 + D2说官杀库 → 同一事不加0.5"

  rule_3_三层叠加直通铁口:
    condition: "原局有 + 大运到位 + 流年引爆 三者齐备"
    effect: "直接进入铁口断（>=★★★★），不需要额外两家佐证"
    source: "M3核心铁律（M1/M2共认此原则）"

  rule_4_实证优先:
    condition: "calibration-log中该规则有>=3次correct记录"
    effect: "confidence自动+0.5，不论理论出处和派别权威"

  rule_5_冲突降级:
    condition: "三家明确分歧且无CF-*裁定可引用"
    effect: "强制降为★★★及以下，不下铁口断"
    followup: "入rule-conflicts.md等待积累案例后裁定"

  rule_6_时辰存疑降级:
    condition: "结论依赖时柱 + 用户时辰标记为模糊或不知"
    effect: "confidence -1.0，上限★★★"

  rule_7_known_facts升级:
    condition: "用户提供的已知事实验证了某条结论"
    effect: "confidence +0.5"

# 与 school-arbitration.md 的对接
conflict_resolution:
  process:
    - "1. 证据聚合器发现三家分歧"
    - "2. 查 protocol/school-arbitration.md 的 CF-* 条目"
    - "3. 有对应CF → 按CF裁定执行"
    - "4. 无对应CF → 降级★★★ + 入rule-conflicts + 默认权重M1>M2>M3"
  cf_reference: "protocol/school-arbitration.md §4（14条CF-*）"
  default_weight: "M1(理法定层次) > M2(象法断细节) > M3(绝招点睛) — 仅作tie-breaker"
