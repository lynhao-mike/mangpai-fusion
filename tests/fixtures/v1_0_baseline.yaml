# ============================================================
# tests/fixtures/v1_0_baseline.yaml
# ============================================================
# v1.0 当前实绩基线（v1.2 必须严格优于此）。
#
# 数据来源：
#   - cases/cases-index.md § 一 案例统计
#   - cases/cases-index.md § 四 4 派表现总表
#   - cases/C-2026-001/feedback.md（铁应验/失验汇总）
#   - cases/C-2026-002/feedback.md
#   - cases/C-2026-014/feedback.md
#
# 用途：
#   tests/regression/test_v1_2_vs_v1_0.py 的全部 G1-G6 断言以此为对照基线。
#   v1.2 引擎产出实测后，需要严格 better-than 此基线，达成 ≥ 5/6 项才能发布
#   （决策 I）。
#
# 维护方：Track-H（08-agent-handoff § 二 H 列）
# ============================================================

schema_version: "1.0"
target_version: "v1.2.0"
measured_at: "2026-05-23"
measured_by: "v1.0 手写报告 + 命主反馈回测"

# ------------------------------------------------------------
# 一、3 个真实案例的核心断语命中率（G1 输入）
# ------------------------------------------------------------
case_hit_rates:
  C-2026-001-庚申戊寅壬子辛丑:
    qualitative_hit_rate: 0.86       # 6/7（含部分应验按 0.5 计 → 实际 5 + 1×0.5 = 5.5/7 ≈ 0.79，cases-index 用 86%）
    yingqi_hit_rate: 0.63             # 5/8（含部分）
    core_iron_correct: 5              # 公门/财L2/妻贵/2020印动/2025事业拐点
    core_iron_wrong: 2                # 婚凶/婚期 8 年差
    notes: "首案，铁应验多但婚姻整体方向错"

  C-2026-002-壬戌庚戌戊辰丙辰:
    qualitative_hit_rate: 0.43        # 3/7（含部分），婚姻全失验
    marriage_failed_count: 4          # 极坎坷/婚期/华盖玄学命/双盘交叉
    notes: "婚姻完全失验，是 v1.2 双盘协同的核心修复目标"

  C-2026-014-丙戌庚子乙亥辛巳:
    qualitative_hit_rate: 0.60        # 4×1 + 4×0.5 / 10
    education_overshot_levels: 1      # 985/211 → 一本，高估一档
    notes: "少年命，学历高估一档；2026 高考预测错（实际 2024）"

# 三案合计核心铁断 + 失验
total_core_iron_correct: 5     # 仅 C-001 有铁应验，其余两案无 ★★★★★ 量级
total_core_iron_wrong: 7       # C-001:2 + C-002:4 + C-014:1

# ------------------------------------------------------------
# 二、关键单项指标（G2/G3/G4 输入）
# ------------------------------------------------------------

# G2 输入：婚期最大误差年数（以 C-2026-001 为代表）
marriage_year_max_error_years: 8

# G3 输入：单案婚姻定性失验数最大（以 C-2026-002 为代表）
marriage_failed_count_max: 4

# G4 输入：单案学历过判档数最大（以 C-2026-014 为代表）
education_overshot_levels_max: 1

# ------------------------------------------------------------
# 三、全局质量指标（G5/G6 输入）
# ------------------------------------------------------------

# G5 输入：平均断语 trace_id 覆盖率
# v1.0 是手写 markdown 报告，没有结构化 trace_id 字段
# v1.2 要求 100%（每条 final_conclusion 都有 evidence: list[Evidence]）
trace_id_coverage_rate: 0.0

# G6 输入：★★★★★ 断语三层 gate 通过率
# v1.0 没有三层 gate 概念
# v1.2 要求 100%（passed_layers=3 才允许 ★★★★★）
three_layer_gate_pass_rate: 0.0

# ------------------------------------------------------------
# 四、4 派整体表现（仅供参考，非 G* 指标）
# ------------------------------------------------------------
school_performance:
  高派:
    总采用次数: 8
    应验数: 5
    失验数: 1
    命中率: 0.83
    note: "金舆嫁贵铁应验"
  段派:
    总采用次数: 8
    应验数: 4.5
    失验数: 0.5
    命中率: 0.83
    note: "公门路 + 富贵层级精准"
  杨派:
    总采用次数: 10
    应验数: 5.5
    失验数: 2
    命中率: 0.63
    note: "妻形象准但婚凶失验"
  任派:
    总采用次数: 9
    应验数: 6
    失验数: 1
    命中率: 0.75
    note: "应期精度领先"

# ------------------------------------------------------------
# 五、版本演进
# ------------------------------------------------------------
notes: |
  v1.0 缺陷总结：
  1. 没有应期三层 gate（G6 = 0%），导致单层引动就敢出 ★★★★★
  2. 没有 trace_id（G5 = 0%），无法追溯失验规律
  3. 婚姻判定过度依赖凶煞 → C-001/002 婚姻失验
  4. 学历判定过度依赖词馆神煞 → C-014 985 高估
  5. 婚期推算无 picture_consistent 校验 → C-001 差 8 年

  v1.2 设计目标（决策 I 6 项门槛）：
  1. 三案核心断语命中率 ≥ v1.0 + 1 条
  2. 婚期误差 ≤ 3 年
  3. 单案婚姻失验 ≤ 1 条
  4. 学历过判 = 0 档
  5. trace_id 覆盖率 = 100%
  6. ★★★★★ 三层 gate 通过率 = 100%
