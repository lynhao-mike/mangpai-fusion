implementation_status_legend:
  已实现: 文件和入口存在，且被当前代码或工具索引直接引用
  部分实现: 文件存在但格式漂移、旁路未接主线、或仅部分能力接入
  未实现: 文档或配置声明但当前扫描范围内不存在对应文件
