#
# v1.2.1 机械铁断 + 黑名单（元数据版）
# ---------------------------------------------------------------
# 来源：engine/mechanical-rules.md v1.0（手写表格） → 升级为 YAML
# 维护者：Track-E 兜底护栏 agent
# 消费者：tools/output_linter.py · tools/three_layer_check.py · engine/mechanical_rules.py
#
# 三类条目：
#   - rules         ：机械铁断的【元数据 + 阈值】
#                     （判定语义 = condition / action / coupling 在
#                      ``engine/mechanical_rules.py``，决策 B 红线）
#   - blacklist     ：已失验的"伪规律"【元数据 + 阻塞域】
#                     （替代规则映射 = ``engine/mechanical_rules.BLACKLIST``）
#   - forbidden_phrases : 词级拦截静态词表（output_linter 词级检查源）
#
# Decision B（已锁定 · engine/contracts/decisions-locked.md）红线：
#   YAML 仅承载 metadata + 阈值；判定逻辑必须 100% 纯 Python。
#   原 v1.2.0 中的 ``rules[].condition`` / ``rules[].action`` /
#   ``rules[].excludes`` / ``rules[].coupled_with`` / ``rules[].require_n_of`` /
#   ``blacklist[].replacement_rules`` 已迁移到 ``engine/mechanical_rules.py``。
# ---------------------------------------------------------------

schema_version: 1.2.1
source: engine/mechanical-rules.md v1.0
upgraded_at: 2026-05-25
upgraded_by: decision-b-cleanup
notes: |
  本文件机器可读。
  规律的判定语义在 ``engine/mechanical_rules.py``（决策 B 红线，详见
  ``engine/contracts/decisions-locked.md``）；本 YAML 仅承载元数据 + 阈值。
  原 .md 文件保留为命理师可读注释版（双轨同步，不冲突）。

# =================================================================
# 一、机械铁断元数据（rules）
# =================================================================
# 仅静态字段：id / name / type / schools / domains / description /
#             confidence_floor / confidence_ceiling / star_ceiling /
#             application_case / falsifiable
# 判定语义在 engine/mechanical_rules.MECHANICAL_RULES。
# =================================================================
rules:

  - id: MR-001
    name: 月柱印星伏吟 → 母亲婚姻反复
    type: requirement
    schools: [杨, 段]
    domains: [六亲, 婚姻]
    description: |
      月柱为母亲宫位，月柱印星与年/日柱同支构成伏吟时，
      母亲感情/婚姻反复（多次婚配概率高）。
    confidence_floor: 0.85
    confidence_ceiling: 0.95
    star_ceiling: 5
    application_case: C-2026-013-壬申甲辰丙辰己丑
    falsifiable: 命主询问母亲是否再婚，可直接证伪

  - id: MR-002
    name: 命局土极旺 → 肤色偏暗
    type: requirement
    schools: [高]
    domains: [体貌]
    description: |
      八字五行中土的本气+中气合计 ≥ 55%，肤色偏黄/偏暗/偏黑。
      火金不极旺时才适用（否则被中和）。
    confidence_floor: 0.85
    star_ceiling: 5
    application_case: C-2026-013-壬申甲辰丙辰己丑
    falsifiable: 见到本人即可直接证伪

  - id: MR-003
    name: 丙日主+食伤透干 → 大眼·嘴大·开朗外向
    type: requirement
    schools: [高, 杨]
    domains: [体貌, 性格]
    description: |
      丙火日主主明目（大眼有神）；
      食神或伤官天干透出（非全藏）→ 嘴阔善言；
      木火通明 → 阳气直 → 性格开朗外向。
    confidence_floor: 0.85
    star_ceiling: 5
    application_case: C-2026-013-壬申甲辰丙辰己丑
    falsifiable: 见到本人即可证伪

  - id: MR-004
    name: 空亡支被流年冲实 → 应期前移
    type: requirement
    schools: [任]
    domains: [应期]
    description: |
      命局某支位空亡（如时支空亡=子女宫空），不必然意味着"晚发生"或"不发生"——
      只要流年地支与该空亡支构成六冲或填实，对应宫位事件即可应期。
      → 严禁单凭"空亡=晚/无"下断。
    confidence_floor: 0.85
    star_ceiling: 5
    application_case: C-2026-013-壬申甲辰丙辰己丑
    falsifiable: 命主回填具体年份事件

  - id: MR-005
    name: 财动婚动联检（坤造婚期）
    type: requirement
    schools: [任]
    domains: [婚姻, 应期]
    description: |
      坤造婚期判定的"三项联检"中的"财动婚动"项。
      流年财星透干并旺 = 婚动信号之一。
      最终判婚期年必须三项中至少 2 项满足：
        (a) 官杀格局动；(b) 财动婚动；(c) 空亡冲实
      联检规约（coupled_with / require_n_of）见 engine/mechanical_rules.MR-005。
    confidence_floor: 0.85
    star_ceiling: 5
    application_case: C-2026-013-壬申甲辰丙辰己丑
    falsifiable: 命主回填实际婚姻年份

  - id: MR-006
    name: 年柱壬申驿马 → 配偶含流动/远方/军职属性
    type: requirement
    schools: [杨]
    domains: [婚姻, 配偶]
    description: |
      年柱地支为驿马支（申子辰生人见寅；寅午戌见申；亥卯未见巳；巳酉丑见亥），
      首任配偶含流动/远方属性；
      若驿马 = 申金 → 兼带军警金属类。
      排除条件（excludes）见 engine/mechanical_rules.MR-006。
    confidence_floor: 0.70
    confidence_ceiling: 0.85
    star_ceiling: 4   # 注意：本条只到 ★★★★，因 v1.0 给的就是 85%
    application_case: C-2026-013-壬申甲辰丙辰己丑
    falsifiable: 命主回填首任配偶背景

# =================================================================
# 二、黑名单元数据（blacklist）—— 已失验，禁止以铁断引用
# =================================================================
# 仅静态字段：id / pattern / aliases / schools_originally_blamed /
#             rejected_in_cases / reason / blocked_in_outputs
# 替代规则映射在 engine/mechanical_rules.BLACKLIST。
# =================================================================
blacklist:

  - id: XF-001
    pattern: "正官藏不透 → 晚婚铁律"
    aliases:
      - "正官藏不透→必晚婚"
      - "官藏=晚婚"
      - "三藏不透必晚婚"
    schools_originally_blamed: [杨]
    rejected_in_cases:
      - C-2026-013-壬申甲辰丙辰己丑
    reason: |
      命主 29 岁首婚（本应"35-41 岁黄金婚期"），完全失验。
      官藏不透 ≠ 晚婚，仅代表"缘分迂回"。
      未联合财动婚动+空亡冲实做三项联检即下铁口断 = 错误使用机械铁断。
    blocked_in_outputs:
      - 婚姻
      - 应期

  - id: XF-002
    pattern: "五凶煞=婚凶"
    aliases:
      - "五凶煞必婚凶"
      - "孤鸾煞+羊刃+红艳+童子=必离"
      - "凶煞集齐=婚姻坎坷"
    schools_originally_blamed: [杨]
    rejected_in_cases:
      - C-2026-002-壬戌庚戌戊辰丙辰
      - C-2026-001-庚申戊寅壬子辛丑
    reason: |
      C-2026-001 实际 23 岁结婚稳定 20+ 年；
      C-2026-002 同样 23 岁稳定婚姻。
      "孤鸾/羊刃/红艳/童子/华盖=必凶" 在两案都失验。
      神煞旁证不能升级为铁断；必须由 D2 婚姻画像 + D3 三层 gate 共同决定。
    blocked_in_outputs:
      - 婚姻

  - id: XF-003
    pattern: "空亡=晚发或不发"
    aliases:
      - "空亡=不应"
      - "宫位空亡=该宫无事"
    schools_originally_blamed: [任]   # 误用任派
    rejected_in_cases:
      - C-2026-013-壬申甲辰丙辰己丑
    reason: |
      空亡需"填实/冲动"才被激活（参考 MR-004）。
      以"空亡=晚/无"直接下铁口断 = 跳过流年冲实分析。
    blocked_in_outputs:
      - 应期
      - 子女
      - 六亲

# =================================================================
# 三、被禁措辞（output_linter 词级拦截）—— 静态词表
# =================================================================
forbidden_phrases:
  hard:    # 一律拒绝（FAIL）
    # 注：故意省略，避免与 soft 重叠时双报错。下列若需阻塞请挪入 hard。
    []
  soft:    # 警告 + 降级一星（WARNING）
    - { phrase: "未来某年", reason: "应期不可指代不明确年份，必须给具体年份" }
    - { phrase: "可能",     reason: "概率化措辞应统一用 ★/% 表达" }
    - { phrase: "一定",     reason: "绝对化措辞，仅 MR 铁断+三层 gate=3 才允许" }
    - { phrase: "肯定",     reason: "同 一定" }
    - { phrase: "必然",     reason: "同 一定" }
    - { phrase: "绝对",     reason: "同 一定" }

# =================================================================
# 四、双向同步指引（与 .md 命理师版 + Python 判定语义的关系）
# =================================================================
sync_with_md: engine/mechanical-rules.md
sync_with_py: engine/mechanical_rules.py
sync_invariants:
  - 本 yaml 中 rules 数量 == .md 第二节铁断数
  - 本 yaml 中 blacklist 数量 == .md 第三节黑名单数
  - 本 yaml 中 rules[].id 集合 == engine/mechanical_rules.MECHANICAL_RULES.keys()
  - 本 yaml 中 blacklist[].id 集合 == engine/mechanical_rules.BLACKLIST.keys()
  - 升降级流程见 engine/contracts/05-rule-lifecycle.md

