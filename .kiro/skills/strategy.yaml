# strategy.yaml · 策略选择器
# v1.0 · 2026-05-23（v1.2 角色降级：仅作输入侧重提示）
#
# v1.2 起本文件**不再驱动分析逻辑**。
# 一切判定（D1-D4 + integrate）由 engine/pipeline.run_pipeline() 在 Python 中执行。
# 本文件保留作为 .kiro/skills/analyst.md 的：
#   - Stage 1 INTAKE：决定优先追问哪些 known_facts
#   - Stage 5 DELIVER：决定 reports/* 中各领域呈现详略
# 即 strategy.yaml 提供**呈现侧重**而非**分析路由**。
#
# 三种策略：
#   A · 问题驱动 = 命主有具体问题 → Stage 5 聚焦该领域呈现
#   B · 全面画像 = 命主想整体了解 → Stage 5 平铺 9 大领域
#   C · 应期精推 = 命主问某具体年份 → Stage 1 重点收集目标年份相关 known_facts

version: "1.0"

# ============================================================
# 策略 A · 问题驱动（PROBLEM_DRIVEN）
# ============================================================
strategy_a:
  name: 问题驱动
  code: PROBLEM_DRIVEN
  
  trigger_keywords:
    - "我什么时候"
    - "我能不能"
    - "为什么我"
    - "我会不会"
    - "我是否"
    - "我的XX如何"
    - "请帮我看XX"
    - "XX怎么样"
  
  process:
    step_1: 识别核心问题领域（婚/财/官/学/健/子等）
    step_2: 查 engine/domain-weights.yaml 取得 lead 派  # v1.2: 降级为输入侧重提示，不驱动分析
    step_3: 4 派对该领域分别查询
    step_4: 共识层 → 互补层 → 独门层 → 冲突仲裁
    step_5: 输出聚焦于该领域的报告
    step_6: 提供 2-3 个相邻领域的简短预警（防止盲点）
  
  output_focus:
    primary: 80%      # 主领域占报告 80%
    adjacent: 15%     # 相邻领域 15%
    overall: 5%       # 总体定性 5%
  
  典型场景:
    - "我什么时候能结婚？" → 婚姻领域，杨派 lead
    - "我适合做什么生意？" → 财运/职业，段派 lead
    - "我父母身体怎样？" → 六亲，杨派 lead
    - "我能考上研究生吗？" → 学业，杨派 lead
  
  use_when: 命主带着明确问题来，时间宝贵不需要全面分析

# ============================================================
# 策略 B · 全面画像（FULL_PORTRAIT）
# ============================================================
strategy_b:
  name: 全面画像
  code: FULL_PORTRAIT
  
  trigger_keywords:
    - "帮我看一下整体"
    - "全面分析"
    - "我的命怎么样"
    - "整体看看"
    - "命盘解读"
    - "完整批命"
  
  process:
    step_1: 4 派全量加载
    step_2: 9 大领域逐一推断
    step_3: 每领域走完整流程（共识 → 互补 → 独门 → 冲突）
    step_4: 应期清单合并整理（按时间排序）
    step_5: 4 派一致性校验（如有大冲突先警示）
    step_6: 输出完整画像 + 一生应期总表
  
  output_focus:
    geju: 10%          # 格局定性
    fugui: 10%         # 富贵层级
    hunyin: 15%        # 婚姻
    caiyun: 15%        # 财运
    jiaoyu: 5%         # 学业
    jiankang: 10%      # 健康
    liuqin: 5%         # 六亲
    yingqi: 25%        # 应期总表（最长篇幅）
    fengxian: 5%       # 风险提示
  
  典型场景:
    - 新命主初次咨询
    - 中年人想做人生回顾 + 未来规划
    - 命理师带学生做案例研究
  
  use_when: 命主未有特定问题，需要 360 度全息视图。报告较长（建议 5000+ 字）

# ============================================================
# 策略 C · 应期精推（TIMING_PRECISE）
# ============================================================
strategy_c:
  name: 应期精推
  code: TIMING_PRECISE
  
  trigger_keywords:
    - "2027 年"
    - "明年"
    - "今年"
    - "丁未流年"
    - "戊戌年"
    - "甲辰大运"
    - "我XX大运怎么样"
    - "XXX年是否"
  
  process:
    step_1: 锁定查询年份/大运
    step_2: 任派 18 道 + 6 触发模型全跑
    step_3: 高派应期六法（合/生/制/墓/送/伏吟）逐条比对
    step_4: 段派应期签字交叉验证
    step_5: 杨派人来印来 / 换象 / 暗合验证
    step_6: 4 模型取交集 = 该年高置信事件
    step_7: 列出该年所有可能事件 + 置信度排名
    step_8: 给出趋吉避凶建议（杨派调候改运）
  
  output_focus:
    timing_rationale: 30%    # 应期机制说明（哪派触发什么）
    events_list: 40%         # 该年可能事件清单（按置信度排序）
    domains_breakdown: 20%   # 各领域影响分解（婚/财/健等）
    advice: 10%              # 趋避建议
  
  典型场景:
    - "2027 年我会不会结婚？"
    - "明年我适合换工作吗？"
    - "我父亲今年身体如何？"
    - "我女儿高考能考好吗？"
  
  use_when: 命主想精确知道某个时间点的吉凶，颗粒度要求高

# ============================================================
# 自动路由规则
# ============================================================
auto_routing:
  description: |
    主分析器在 Step 2 自动判断走哪个策略。  # v1.2: 由 analyst.md Stage 1 INTAKE 用作输入侧重提示
    判断逻辑（优先级从高到低）：
  
  rules:
    - if: 用户问题含具体年份 / 流年 / 大运名
      then: strategy_c
    - if: 用户用 "整体 / 全面 / 完整批命"
      then: strategy_b
    - if: 用户用 "我什么时候 / 怎样 / 能不能"
      then: strategy_a
    - default: strategy_b   # 兜底全面画像

  override:
    description: 用户可显式指定策略
    syntax: "策略 A" / "策略 B" / "策略 C"
    example: "[策略 A] 我什么时候结婚？"

# ============================================================
# 策略组合（可选）
# ============================================================
combo_strategies:
  
  ab_combo:
    name: 单问题深推 + 全图速览
    description: 先按 A 深推问题，再用 1/4 篇幅做 B 简化版
    use_when: 命主有问题但希望了解更多
  
  bc_combo:
    name: 全面 + 关键应期
    description: B 跑完后自动追加未来 5 年应期清单
    use_when: 命主关心未来 5 年规划
  
  abc_combo:
    name: 完整批命三段式
    description: A 锁定主问题 + B 补背景 + C 锁定关键年
    use_when: 命主希望最完整服务（命理师收高额费用场景）

# ============================================================
# 策略选择器使用规则
# ============================================================
usage:
  
  - rule: 策略一旦选定，本会话不可中途切换
    rationale: 避免分析逻辑断裂
    workaround: 用户可显式说"换策略 B" → 重启分析
  
  - rule: 策略 C 必须有原局基础
    requirement: 在策略 C 之前应有过 A 或 B 分析（或同会话补做格局定性）
    rationale: 应期推断需要原局做底
  
  - rule: 报告输出长度
    strategy_a: 中等（2000-3000 字）
    strategy_b: 长（5000-8000 字）
    strategy_c: 中等（2500-4000 字）
  
  - rule: 默认保守
    description: 遇到 ambiguous 输入，优先选策略 B（更全面，避免遗漏）

# ============================================================
# 元数据
# ============================================================
metadata:
  version: "1.0"
  inspired_by: gufamangpai/strategy-selector.yaml
